name: SeenAt
options:
  bundleIdPrefix: com.seenat
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "6.0"

targets:
  SeenAt:
    type: application
    platform: iOS
    sources:
      - SeenAt
    settings:
      base:
        INFOPLIST_FILE: SeenAt/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.seenat.app
        PRODUCT_NAME: SeenAt
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DR9TT398PM
        TARGETED_DEVICE_FAMILY: "1"
        ALWAYS_SEARCH_USER_PATHS: "NO"

  SeenAtTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SeenAtTests
    dependencies:
      - target: SeenAt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seenat.app.tests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DR9TT398PM
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES

  SeenAtUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SeenAtUITests
    dependencies:
      - target: SeenAt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seenat.app.uitests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DR9TT398PM
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES

  SeenAtWidget:
    type: app-extension
    platform: iOS
    productType: widget-extension
    sources:
      - path: SeenAtWidget
      - path: SeenAt/Models/SeenAtActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seenat.app.widget
        INFOPLIST_FILE: SeenAtWidget/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DR9TT398PM
        PRODUCT_NAME: SeenAtWidget
        GENERATE_INFOPLIST_FILE: NO
